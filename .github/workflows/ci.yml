name: CI

on:
  push:
    branches: [main, master, develop, fix_*]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  PIP_CACHE_DIR: ./.cache/pip
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHONUNBUFFERED: '1'
  PIP_DEFAULT_TIMEOUT: '120'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

jobs:
  test-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backtest-worker
        uses: actions/checkout@v4
        with:
          path: backtest-worker

      - name: Checkout data-access-lib
        uses: actions/checkout@v4
        with:
          repository: blueenergy/data-access-lib
          path: data-access-lib

      - name: Checkout quant-strategies
        uses: actions/checkout@v4
        with:
          repository: blueenergy/quant-strategies
          path: quant-strategies

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backtest-worker
        run: |
          python -m pip install --upgrade pip
          pip install -e ../data-access-lib
          pip install -e ../quant-strategies
          grep -v '^-e ' requirements.txt > /tmp/backtest_requirements.txt
          pip install -r /tmp/backtest_requirements.txt
          pip install pytest

      - name: Compile worker modules
        working-directory: backtest-worker
        run: |
          python -m py_compile \
            worker/backtest_worker.py \
            worker/simple_backtest_runner.py \
            tests/test_backtest_worker.py \
            tests/test_simple_backtest_runner.py

      - name: Run focused tests
        working-directory: backtest-worker
        env:
          PYTHONPATH: worker:../quant-strategies:.
        run: |
          pytest -q \
            tests/test_backtest_worker.py::test_config_loading \
            tests/test_backtest_worker.py::test_worker_poll_tasks \
            tests/test_integration.py::test_worker_authentication_headers \
            tests/test_simple_backtest_runner.py::TestSimpleBacktestRunner::test_fetch_etf_frame

      - name: Docker build smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backtest-worker/Dockerfile
          push: false
          tags: backtest-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker:
    name: Build & Push Docker image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [test-build]
    steps:
      - name: Checkout backtest-worker
        uses: actions/checkout@v4
        with:
          path: backtest-worker

      - name: Checkout data-access-lib
        uses: actions/checkout@v4
        with:
          repository: blueenergy/data-access-lib
          path: data-access-lib

      - name: Checkout quant-strategies
        uses: actions/checkout@v4
        with:
          repository: blueenergy/quant-strategies
          path: quant-strategies

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USER }}
          password: ${{ secrets.ALIYUN_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/blueenergy/backtest-worker
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backtest-worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy backtest-worker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [test-build, docker]
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BACKTEST_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan "${{ secrets.BACKTEST_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull image and deploy
        timeout-minutes: 15
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            ${{ secrets.BACKTEST_DEPLOY_USER }}@${{ secrets.BACKTEST_DEPLOY_HOST }} \
            "ALIYUN_USER='${{ secrets.ALIYUN_USER }}' ALIYUN_TOKEN='${{ secrets.ALIYUN_TOKEN }}' bash -s" <<'EOF'
          set -euo pipefail

          IMAGE="crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker:latest"
          ENV_FILE="${BACKTEST_WORKER_ENV_FILE:-/home/deployuser/backtest-worker/.env}"
          CACHE_DIR="${BACKTEST_WORKER_CACHE_DIR:-/home/deployuser/backtest-worker/cache}"

          log_step() {
            echo "[$(date '+%Y-%m-%d %H:%M:%S %z')] $*"
          }

          log_step "Logging in to Aliyun registry"
          timeout 60 docker login crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com \
            -u "$ALIYUN_USER" \
            -p "$ALIYUN_TOKEN"

          log_step "Pulling backtest-worker image"
          timeout 300 docker pull "$IMAGE"

          log_step "Preparing runtime directories"
          mkdir -p "$CACHE_DIR"

          log_step "Stopping existing backtest-worker"
          timeout 30 docker stop -t 20 backtest-worker 2>/dev/null || true
          timeout 30 docker rm backtest-worker 2>/dev/null || true

          log_step "Starting backtest-worker"
          timeout 60 docker run -d \
            --name backtest-worker \
            --restart unless-stopped \
            --add-host=host.docker.internal:host-gateway \
            --env-file "$ENV_FILE" \
            -e TZ=Asia/Shanghai \
            --log-driver json-file \
            --log-opt max-size=50m \
            --log-opt max-file=3 \
            -v "$CACHE_DIR":/app/cache \
            "$IMAGE"

          log_step "Listing deployed container"
          docker ps --filter "name=backtest-worker"

          log_step "Pruning old images"
          timeout 120 docker image prune -f || true

          log_step "Deploy finished"
          EOF
