name: CI

on:
  push:
    branches: [main, master, develop, fix_*]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  PIP_CACHE_DIR: ./.cache/pip
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHONUNBUFFERED: '1'
  PIP_DEFAULT_TIMEOUT: '120'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

jobs:
  test-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backtest-worker
        uses: actions/checkout@v4
        with:
          path: backtest-worker

      - name: Validate dependency repo token
        env:
          DEPENDENCY_REPO_TOKEN: ${{ secrets.DEPENDENCY_REPO_TOKEN }}
        run: |
          if [ -z "$DEPENDENCY_REPO_TOKEN" ]; then
            echo "DEPENDENCY_REPO_TOKEN is required to checkout private dependency repositories."
            exit 1
          fi

      - name: Checkout data-access-lib
        uses: actions/checkout@v4
        with:
          repository: blueenergy/data-access-lib
          path: data-access-lib
          token: ${{ secrets.DEPENDENCY_REPO_TOKEN }}

      - name: Checkout quant-strategies
        uses: actions/checkout@v4
        with:
          repository: blueenergy/quant-strategies
          path: quant-strategies
          token: ${{ secrets.DEPENDENCY_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backtest-worker
        run: |
          python -m pip install --upgrade pip
          pip install -e ../data-access-lib
          pip install -e ../quant-strategies
          grep -v '^-e ' requirements.txt > /tmp/backtest_requirements.txt
          pip install -r /tmp/backtest_requirements.txt
          pip install pytest

      - name: Compile worker modules
        working-directory: backtest-worker
        run: |
          python -m py_compile \
            worker/backtest_worker.py \
            worker/simple_backtest_runner.py \
            tests/test_backtest_worker.py \
            tests/test_simple_backtest_runner.py

      - name: Run focused tests
        working-directory: backtest-worker
        env:
          PYTHONPATH: worker:../quant-strategies:.
        run: |
          pytest -q \
            tests/test_backtest_worker.py::test_config_loading \
            tests/test_backtest_worker.py::test_worker_poll_tasks \
            tests/test_integration.py::test_worker_deprecated_token_is_ignored \
            tests/test_simple_backtest_runner.py::TestSimpleBacktestRunner::test_fetch_etf_frame

  docker-build:
    name: Build & Push Arch Image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-build]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout backtest-worker
        uses: actions/checkout@v4
        with:
          path: backtest-worker

      - name: Validate dependency repo token
        env:
          DEPENDENCY_REPO_TOKEN: ${{ secrets.DEPENDENCY_REPO_TOKEN }}
        run: |
          if [ -z "$DEPENDENCY_REPO_TOKEN" ]; then
            echo "DEPENDENCY_REPO_TOKEN is required to checkout private dependency repositories."
            exit 1
          fi

      - name: Checkout data-access-lib
        uses: actions/checkout@v4
        with:
          repository: blueenergy/data-access-lib
          path: data-access-lib
          token: ${{ secrets.DEPENDENCY_REPO_TOKEN }}

      - name: Checkout quant-strategies
        uses: actions/checkout@v4
        with:
          repository: blueenergy/quant-strategies
          path: quant-strategies
          token: ${{ secrets.DEPENDENCY_REPO_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USER }}
          password: ${{ secrets.ALIYUN_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/blueenergy/backtest-worker
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker
          tags: |
            type=sha,prefix=sha-,format=short,suffix=-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backtest-worker/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}

  docker-manifest:
    name: Merge Manifests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USER }}
          password: ${{ secrets.ALIYUN_TOKEN }}

      - name: Create and push manifests
        run: |
          SHA_TAG="sha-${GITHUB_SHA::7}"
          
          # GHCR
          docker manifest create ghcr.io/blueenergy/backtest-worker:latest \
            ghcr.io/blueenergy/backtest-worker:latest-amd64 \
            ghcr.io/blueenergy/backtest-worker:latest-arm64
          docker manifest push ghcr.io/blueenergy/backtest-worker:latest
          
          docker manifest create ghcr.io/blueenergy/backtest-worker:$SHA_TAG \
            ghcr.io/blueenergy/backtest-worker:$SHA_TAG-amd64 \
            ghcr.io/blueenergy/backtest-worker:$SHA_TAG-arm64
          docker manifest push ghcr.io/blueenergy/backtest-worker:$SHA_TAG

          # ACR
          docker manifest create crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker:latest \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker:latest-amd64 \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker:latest-arm64
          docker manifest push crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker:latest
          
          docker manifest create crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker:$SHA_TAG \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker:$SHA_TAG-amd64 \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker:$SHA_TAG-arm64
          docker manifest push crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker:$SHA_TAG

  release:
    name: Bump image tag in quant-infrastructure & trigger deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [test-build, docker-manifest]
    steps:
      - name: Compute image tag
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Checkout quant-infrastructure
        uses: actions/checkout@v4
        with:
          repository: blueenergy/quant-infrastructure
          ref: main
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Bump versions.env (rebase-retry on concurrent pushes)
        working-directory: infra
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          KEY: BACKTEST_WORKER_IMAGE_TAG
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --hard --quiet origin/main
            sed -i "s|^${KEY}=.*|${KEY}=${TAG}|" apps/versions.env
            if git diff --quiet apps/versions.env; then
              echo "versions.env already at ${TAG}; nothing to commit."
              exit 0
            fi
            git add apps/versions.env
            git commit -m "deploy(backtest-worker): ${TAG}"
            if git push origin main; then
              echo "Pushed tag bump (${TAG})."
              exit 0
            fi
            echo "Push raced (attempt ${attempt}); retrying..."
            sleep $((attempt * 5))
          done
          echo "Failed to push tag bump after retries." >&2
          exit 1

      - name: Trigger centralized deploy
        env:
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${INFRA_REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/blueenergy/quant-infrastructure/dispatches \
            -d "{\"event_type\":\"deploy\",\"client_payload\":{\"services\":\"backtest-worker\",\"tag\":\"${TAG}\"}}"
